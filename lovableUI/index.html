<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyWiFi Command Center</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/index.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: hsl(240,10%,7%); color: hsl(210,20%,92%); font-family: Ubuntu, system-ui, sans-serif; }
    .app { display: grid; grid-template-rows: 48px 1fr 24px; height: 100vh; }
    .header { display:flex; align-items:center; justify-content:space-between; padding: 8px 14px; background: hsl(240,8%,10%); border-bottom:1px solid hsl(240,6%,18%); }
    .brand { display:flex; align-items:center; gap:8px; }
    .brand img { width:20px; height:20px; }
    .brand .title { color:hsl(27,76%,53%); font-weight:700; }
    .brand .subtitle { color:hsl(215,15%,55%); font-size:12px; }
    .tabs { display:flex; gap:8px; }
    .tab { background:transparent; color:hsl(215,15%,55%); border:1px solid transparent; border-radius:6px; padding:6px 10px; }
    .tab.active { background:hsl(27,76%,53%); color:white; }
    .right { display:flex; align-items:center; gap:10px; color:hsl(215,15%,55%); font-size:12px; }
    .right strong { color:hsl(210,20%,92%); }
    .btn { border:1px solid hsl(240,6%,18%); background:hsl(240,6%,14%); color:hsl(210,20%,92%); border-radius:6px; padding:6px 10px; }
    .btn.primary { background:hsl(27,76%,53%); color:white; border-color:hsl(27,76%,53%); }
    .main { display:grid; grid-template-columns: 65% 35%; min-height:0; }
    .panel { border-right:1px solid hsl(240,6%,18%); display:flex; flex-direction:column; min-width:0; }
    .subheader { padding:8px 12px; border-bottom:1px solid hsl(240,6%,18%); color:hsl(215,15%,55%); font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    .table-shell { flex:1; overflow:auto; padding:8px 12px; color:hsl(215,15%,55%); }
    .detail { padding:10px 12px; overflow:auto; }
    .card { background:hsl(240,6%,14%); border:1px solid hsl(240,6%,18%); border-radius:8px; padding:10px; margin-bottom:10px; }
    .footer { background:hsl(240,8%,10%); border-top:1px solid hsl(240,6%,18%); display:flex; align-items:center; justify-content:space-between; padding:4px 12px; font-size:10px; color:hsl(215,15%,55%); }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand"><img src="/placeholder.svg" alt="logo"/><span class="title">EasyWiFi</span><span class="subtitle">Command Center</span></div>
      <nav class="tabs">
        <button class="tab active">Access Points</button>
        <button class="tab">Clients &amp; Probes</button>
        <button class="tab">Bluetooth</button>
      </nav>
      <div class="right">
        <span>APs: <strong id="aps-count">0</strong></span>
        <span>Clients: <strong id="clients-count">0</strong></span>
        <button class="btn" id="settings-btn">⚙</button>
        <button class="btn primary" id="scan-btn">Start Scan</button>
      </div>
    </header>
    <main class="main">
      <section class="panel">
        <div class="subheader">Discovered Access Points</div>
        <div class="table-shell">Web UI shell loaded from lovableUI. Backend data/API wiring is in progress.</div>
      </section>
      <aside class="detail">
        <div class="card"><strong>Details</strong><div id="health" style="margin-top:8px;color:hsl(215,15%,55%)">Checking backend…</div></div>
      </aside>
    </main>
    <footer class="footer"><span>Interface: --</span><span id="scan-state">Idle</span></footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
